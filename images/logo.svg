<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="50%" style="stop-color:#C44569"/>
      <stop offset="100%" style="stop-color:#FF8A5B"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cute fox face -->
  <g transform="translate(10, 10)">
    <!-- Left ear -->
    <path d="M15 35 L5 5 L35 25 Z" fill="#FF6B9D" stroke="#C44569" stroke-width="2"/>
    <path d="M17 30 L10 12 L30 26 Z" fill="#FFD1DC"/>
    
    <!-- Right ear -->
    <path d="M85 35 L95 5 L65 25 Z" fill="#FF6B9D" stroke="#C44569" stroke-width="2"/>
    <path d="M83 30 L90 12 L70 26 Z" fill="#FFD1DC"/>
    
    <!-- Face -->
    <ellipse cx="50" cy="50" rx="40" ry="38" fill="#FF6B9D" stroke="#C44569" stroke-width="2"/>
    
    <!-- Inner face highlight -->
    <ellipse cx="50" cy="52" rx="32" ry="30" fill="#FFB6C1"/>
    
    <!-- Eyes -->
    <ellipse cx="35" cy="45" rx="10" ry="12" fill="#FFFFFF"/>
    <ellipse cx="65" cy="45" rx="10" ry="12" fill="#FFFFFF"/>
    
    <circle cx="37" cy="47" r="6" fill="#2C3E50"/>
    <circle cx="67" cy="47" r="6" fill="#2C3E50"/>
    
    <!-- Eye sparkles -->
    <circle cx="39" cy="44" r="2" fill="#FFFFFF"/>
    <circle cx="69" cy="44" r="2" fill="#FFFFFF"/>
    
    <!-- Nose -->
    <ellipse cx="50" cy="62" rx="6" ry="4" fill="#C44569"/>
    
    <!-- Mouth -->
    <path d="M44 68 Q50 75 56 68" stroke="#C44569" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Cheek blush -->
    <ellipse cx="25" cy="58" rx="8" ry="5" fill="#FFB6C1" opacity="0.7"/>
    <ellipse cx="75" cy="58" rx="8" ry="5" fill="#FFB6C1" opacity="0.7"/>
    
    <!-- Whiskers -->
    <g stroke="#C44569" stroke-width="1" opacity="0.5">
      <line x1="10" y1="55" x2="28" y2="58"/>
      <line x1="10" y1="62" x2="28" y2="62"/>
      <line x1="10" y1="69" x2="28" y2="66"/>
      <line x1="90" y1="55" x2="72" y2="58"/>
      <line x1="90" y1="62" x2="72" y2="62"/>
      <line x1="90" y1="69" x2="72" y2="66"/>
    </g>
  </g>
  
  <!-- Text "attilano" -->
  <text x="120" y="75" font-family="'Comic Sans MS', 'Segoe Print', cursive" font-size="48" font-weight="bold" fill="url(#logoGradient)" filter="url(#glow)">
    attilano
  </text>
  
  <!-- Decorative stars -->
  <g fill="#FFD700" filter="url(#glow)">
    <polygon points="115,25 117,32 125,32 119,37 121,45 115,40 109,45 111,37 105,32 113,32" transform="scale(0.5) translate(100, 10)"/>
    <polygon points="115,25 117,32 125,32 119,37 121,45 115,40 109,45 111,37 105,32 113,32" transform="scale(0.4) translate(680, 50)"/>
  </g>
</svg>